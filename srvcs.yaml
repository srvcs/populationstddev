schemaVersion: 1
name: "srvcs-populationstddev"
slug: "populationstddev"
repository: "srvcs/populationstddev"
package: "srvcs-populationstddev"
function: "statistics: population standard deviation"
kind: "orchestrator"
categories:
  - "statistics"
dependencies:
  - slug: "populationvariance"
    service: "srvcs-populationvariance"
  - slug: "sqrt"
    service: "srvcs-sqrt"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "values"
    type: "json[]"
    required: true
outputs:
  - name: "values"
    type: "json[]"
  - name: "result"
    type: "number"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_POPULATIONVARIANCE_URL"
    default: ""
    purpose: "Base URL for srvcs-populationvariance"
  - name: "SRVCS_SQRT_URL"
    default: "http://127.0.0.1:8091"
    purpose: "Base URL for srvcs-sqrt"
